name: Keep Render backend awake

on:
  schedule:
    - cron: '*/10 * * * *'   # cada 10 minutos
  workflow_dispatch:          # permite dispararlo manual para probar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: curl -sf https://supermarket-list-pxso.onrender.com/api/products || exit 0
